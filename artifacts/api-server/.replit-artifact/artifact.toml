kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# Start the server directly. Do NOT run `drizzle-kit push` here: this DB has
# tables Drizzle doesn't manage (and a populated `contracts` table), so a forced
# push would DROP/TRUNCATE them — the `db push-force` script is intentionally
# disabled and exits non-zero, which previously aborted startup. Additive schema
# changes are applied idempotently by the API server's runMigrations() on boot
# (see artifacts/api-server/src/app.ts); verify with `pnpm --filter @workspace/db run check-drift`.
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
